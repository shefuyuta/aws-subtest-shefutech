<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Twizzer</title>
<style>
/* ===== Base ===== */
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background-color: #0B0F1A;
  color: #E6F0FF;
}

/* ===== Layout ===== */
.container {
  display: flex;
  justify-content: center;
}

.timeline {
  width: 600px;
  border-left: 1px solid #1A2235;
  border-right: 1px solid #1A2235;
  min-height: 100vh;
}

/* ===== Header ===== */
.header {
  padding: 16px;
  font-size: 22px;
  font-weight: bold;
  border-bottom: 1px solid #1A2235;
  color: #00A7DB;
}

/* ===== Composer ===== */
.composer {
  padding: 16px;
  border-bottom: 1px solid #1A2235;
}

textarea {
  width: 100%;
  height: 80px;
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  resize: none;
}

textarea:focus {
  outline: none;
}

/* ===== Button ===== */
.button {
  background: linear-gradient(90deg, #007FC7, #00A7DB);
  border: none;
  padding: 10px 18px;
  border-radius: 20px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  float: right;
}

.button:hover {
  background: linear-gradient(90deg, #00A7DB, #007FC7);
}

/* ===== Posts ===== */
.post {
  padding: 16px;
  border-bottom: 1px solid #1A2235;
  transition: background 0.2s;
}

.post:hover {
  background-color: #121A2A;
}

.post-text {
  font-size: 15px;
  line-height: 1.5;
}

.timestamp {
  font-size: 12px;
  color: #6B7A99;
  margin-top: 6px;
}

/* ===== Wiz Glow Accent ===== */
.header {
  text-shadow: 0 0 10px rgba(0,167,219,0.6);
}
.button {
  box-shadow: 0 0 10px rgba(0,167,219,0.4);
}
</style>
</head>

<body>

<div class="container">
  <div class="timeline">

    <div class="header">Twizzer</div>

    <div class="composer">
      <textarea id="text" placeholder="What's happening?"></textarea>
      <button class="button" onclick="post()">Post</button>
      <div style="clear: both;"></div>
    </div>

    <div id="posts"></div>

  </div>
</div>

<script>
async function load() {
  const res = await fetch("/posts");
  const data = await res.json();

  const container = document.getElementById("posts");
  container.innerHTML = "";

  data.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post-text">${p.text}</div>
      <div class="timestamp">${new Date(p.createdAt).toLocaleString()}</div>
    `;

    container.appendChild(div);
  });
}

async function post() {
  const text = document.getElementById("text").value;
  if (!text) return;

  await fetch("/post", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ text })
  });

  document.getElementById("text").value = "";
  load();
}

load();
</script>

</body>
</html>
